background {
    monitor =
    path = /usr/share/sddm/themes/silent/backgrounds/acantilado.png
    blur_passes = 0
    color = rgba(1e1e2ecc)
}

label {
    monitor =
    text = $TIME
    color = rgba(ffffffff)
    font_size = 70
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(ffffffff)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -5
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 30
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.2
    outer_color = rgba(ffffffff)
    inner_color = rgba(ffffff33)
    font_color = rgba(ffffffff)
    fade_on_empty = true
    rounding = 10
    placeholder_text = <i>Contraseña...</i>
    hide_input = false
    position = 0, -60
    halign = center
    valign = center
}
